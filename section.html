<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Раздел - Математика с Никитой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0b0e1a; color: #ffffff; line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background: transparent; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 1; transform: scale(1.5); } }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

        header { background: linear-gradient(135deg, #0d1b2a, #1b2a4a, #0d1b2a); padding: 40px 20px; text-align: center; border-radius: 24px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 60px rgba(48, 43, 99, 0.3); }
        header h1 { font-size: 36px; font-weight: 900; letter-spacing: 2px; }
        header h1 span { color: #f5a623; text-shadow: 0 0 30px rgba(245, 166, 35, 0.3); }
        .back-link { display: inline-block; margin-top: 15px; color: #f5a623; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: #ffffff; }

        .section-title { font-size: 32px; color: #f5a623; margin-bottom: 30px; text-align: center; text-shadow: 0 0 30px rgba(245, 166, 35, 0.2); }

        .video-item { padding: 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; margin-bottom: 16px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .video-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(102, 126, 234, 0.3); }
        .video-item .play-icon { font-size: 28px; color: #667eea; margin-right: 16px; }
        .video-item a { color: #b0c4de; text-decoration: none; font-size: 18px; font-weight: 500; }
        .video-item a:hover { color: #ffffff; }
        .video-item .video-homework { margin-top: 16px; padding: 16px 20px; background: rgba(39, 174, 96, 0.1); border-radius: 12px; border-left: 4px solid #27ae60; color: #7ddfa0; font-size: 16px; }
        .video-item .video-homework strong { color: #ffffff; }
        .video-item .video-homework a { color: #7ddfa0; text-decoration: underline; }
        .video-item .video-homework a:hover { color: #ffffff; }

        .empty { color: #666; font-style: italic; font-size: 18px; text-align: center; padding: 40px; }
        .loading { text-align: center; padding: 40px; color: #b0c4de; font-size: 18px; }

        footer { text-align: center; padding: 30px 20px; color: #666; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }

        @media (max-width: 700px) {
            header h1 { font-size: 28px; }
            .section-title { font-size: 24px; }
            .video-item a { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="stars" id="starsContainer"></div>

    <div class="container">

        <header>
            <h1>📐 Математика с <span>Никитой</span></h1>
            <a href="index.html" class="back-link">← Назад к списку разделов</a>
        </header>

        <div id="sectionContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>

    </div>

    <footer>
        © 2026 Математика с Никитой. Все права защищены.
    </footer>

    <script>
        (function generateStars() {
            var container = document.getElementById('starsContainer');
            var count = 150;
            for (var i = 0; i < count; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                var size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = (Math.random() * 3) + 's';
                container.appendChild(star);
            }
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        var SUPABASE_URL = 'https://liqqdixrtvnrrvgkfvbn.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpcXFkaXhydHZucnJ2Z2tmdmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTMzMzksImV4cCI6MjA5OTQyOTMzOX0.Jqrnt5DOKNURe5HERWIhMvc6KChurAg5iHkfMBw4P2A';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var urlParams = new URLSearchParams(window.location.search);
        var sectionId = urlParams.get('id');
        var content = document.getElementById('sectionContent');

        async function loadSection() {
            if (!sectionId) {
                content.innerHTML = '<div class="empty">❌ Раздел не найден</div>';
                return;
            }

            content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

            try {
                var sectionResult = await supabase
                    .from('video_sections')
                    .select('*')
                    .eq('id', sectionId)
                    .single();

                if (sectionResult.error) {
                    content.innerHTML = '<div class="empty">❌ Раздел не найден</div>';
                    return;
                }

                var section = sectionResult.data;

                var videosResult = await supabase
                    .from('videos')
                    .select('*')
                    .eq('section_id', sectionId)
                    .order('created_at', { ascending: false });

                var videos = videosResult.data || [];

                var html = '<h1 class="section-title">' + section.name + '</h1>';

                if (videos.length === 0) {
                    html += '<div class="empty">📭 Нет видео в этом разделе</div>';
                } else {
                    videos.forEach(function(v) {
                        html += `
                            <div class="video-item">
                                <div>
                                    <span class="play-icon">▶️</span>
                                    <a href="${v.youtube_url || '#'}" target="_blank">${v.title}</a>
                                </div>
                                ${v.homework ? `
                                    <div class="video-homework">
                                        <strong>📝 ДЗ к уроку:</strong> ${v.homework}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }

                content.innerHTML = html;

            } catch (err) {
                content.innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
                console.error(err);
            }
        }

        loadSection();
    </script>

</body>
</html>
