<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагностика таблиц</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 30px auto; padding: 20px; background: #f4f4f4; }
        .block { background: white; padding: 20px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .ok { color: green; font-weight: bold; }
        .err { color: red; font-weight: bold; }
        .warn { color: orange; font-weight: bold; }
        pre { background: #eee; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
        button { background: #302b63; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1a1a2e; }
    </style>
</head>
<body>

    <h1>🔍 Диагностика таблиц</h1>

    <div class="block">
        <h3>📋 Таблица <code>video_sections</code></h3>
        <button id="checkBtn">Проверить</button>
        <div id="output" style="margin-top: 15px;"></div>
    </div>

    <div class="block">
        <h3>📋 Таблица <code>videos</code></h3>
        <button id="checkVideosBtn">Проверить</button>
        <div id="videosOutput" style="margin-top: 15px;"></div>
    </div>

    <div class="block">
        <h3>🔌 Статус подключения</h3>
        <button id="pingBtn">Пинг</button>
        <div id="pingOutput" style="margin-top: 15px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== ТВОИ ДАННЫЕ =====
        var SUPABASE_URL = 'https://liqqdixrtvnrrvgkfvbn.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpcXFkaXhydHZucnJ2Z2tmdmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTMzMzksImV4cCI6MjA5OTQyOTMzOX0.Jqrnt5DOKNURe5HERWIhMvc6KChurAg5iHkfMBw4P2A';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var output = document.getElementById('output');
        var videosOutput = document.getElementById('videosOutput');
        var pingOutput = document.getElementById('pingOutput');

        // ===== 1. ПРОВЕРКА video_sections =====
        document.getElementById('checkBtn').addEventListener('click', async function() {
            output.innerHTML = '⏳ Проверяю...';

            try {
                var result = await supabase
                    .from('video_sections')
                    .select('*');

                if (result.error) {
                    output.innerHTML = `<div class="err">❌ Ошибка: ${result.error.message}</div>`;
                    return;
                }

                var data = result.data || [];
                if (data.length === 0) {
                    output.innerHTML = `<div class="warn">⚠️ Таблица video_sections есть, но данных нет (0 записей)</div>`;
                    return;
                }

                var html = `<div class="ok">✅ Найдено записей: ${data.length}</div>`;
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                output.innerHTML = html;

            } catch (err) {
                output.innerHTML = `<div class="err">❌ Ошибка: ${err.message}</div>`;
            }
        });

        // ===== 2. ПРОВЕРКА videos =====
        document.getElementById('checkVideosBtn').addEventListener('click', async function() {
            videosOutput.innerHTML = '⏳ Проверяю...';

            try {
                var result = await supabase
                    .from('videos')
                    .select('*');

                if (result.error) {
                    videosOutput.innerHTML = `<div class="err">❌ Ошибка: ${result.error.message}</div>`;
                    return;
                }

                var data = result.data || [];
                if (data.length === 0) {
                    videosOutput.innerHTML = `<div class="warn">⚠️ Таблица videos есть, но данных нет (0 записей)</div>`;
                    return;
                }

                var html = `<div class="ok">✅ Найдено видео: ${data.length}</div>`;
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                videosOutput.innerHTML = html;

            } catch (err) {
                videosOutput.innerHTML = `<div class="err">❌ Ошибка: ${err.message}</div>`;
            }
        });

        // ===== 3. ПИНГ =====
        document.getElementById('pingBtn').addEventListener('click', async function() {
            pingOutput.innerHTML = '⏳ Проверяю...';

            try {
                var start = Date.now();
                var result = await supabase
                    .from('students')
                    .select('count', { count: 'exact', head: true });

                var time = Date.now() - start;

                if (result.error) {
                    pingOutput.innerHTML = `<div class="err">❌ Ошибка: ${result.error.message}</div>`;
                    return;
                }

                pingOutput.innerHTML = `<div class="ok">✅ Подключение работает (${time} мс)</div>`;

            } catch (err) {
                pingOutput.innerHTML = `<div class="err">❌ Ошибка: ${err.message}</div>`;
            }
        });

        // ===== АВТОЗАПУСК =====
        setTimeout(function() {
            document.getElementById('pingBtn').click();
            document.getElementById('checkBtn').click();
        }, 500);
    </script>

</body>
</html>
